<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>404 — SUBPRESS</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/img/favicon.ico" sizes="any">
  <link rel="icon" href="/img/favicon-32x32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="/img/favicon-16x16.png" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @font-face {
      font-family: 'Cascadia Code'; font-style: normal; font-weight: 500; font-display: swap;
      src: url(https://fonts.gstatic.com/s/cascadiacode/v5/qWc_B6-zq5zxD57cT5s916v3QjfzRuG9AIUcXuU-OaDKb9pHaHCA.woff2) format('woff2');
    }
    :root {
      --y: #ffeb3b; --k: #000; --w: #fff;
      --sora: 'Sora', sans-serif;
      --mono: 'Cascadia Code', monospace;
    }

    @media (pointer: fine) { body { cursor: none; } }

    body {
      background: var(--k);
      color: var(--w);
      font-family: var(--sora);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Grain */
    body::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9998;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: .035;
    }

    /* Cursor */
    .cursor { display: none; position: fixed; top: 0; left: 0; width: 10px; height: 10px; background: var(--y); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: width .3s cubic-bezier(.16,1,.3,1), height .3s cubic-bezier(.16,1,.3,1); }
    .cursor.active { display: block; }
    .cursor.large { width: 48px; height: 48px; }

    /* Nav */
    nav {
      padding: 0 80px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 10;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .nav-logo-link { display: flex; align-items: center; text-decoration: none; }
    .nav-back { font-family: var(--mono); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .08em; color: rgba(255,255,255,.5); text-decoration: none; transition: color .2s; display: flex; align-items: center; gap: 8px; }
    .nav-back:hover { color: var(--y); }
    .nav-back svg { width: 14px; height: 14px; }

    /* Main */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 80px 80px 60px;
    }

    .error-number {
      font-family: var(--sora);
      font-size: clamp(160px, 28vw, 380px);
      font-weight: 800;
      line-height: .85;
      letter-spacing: -.05em;
      color: var(--y);
      user-select: none;
    }

    .error-body {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 40px;
      padding-top: 60px;
      border-top: 1px solid rgba(255,255,255,.12);
      margin-top: 60px;
    }

    .error-message {
      font-family: var(--sora);
      font-size: clamp(18px, 2.2vw, 28px);
      font-weight: 600;
      line-height: 1.3;
      color: var(--w);
      max-width: 480px;
    }

    .error-message em {
      font-style: normal;
      color: var(--y);
    }

    .error-links {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }

    .error-link {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: rgba(255,255,255,.5);
      text-decoration: none;
      transition: color .2s;
    }
    .error-link:hover { color: var(--y); }

    @media (max-width: 600px) {
      nav { padding: 0 24px; }
      main { padding: 48px 24px 40px; }
      .error-body { flex-direction: column; align-items: flex-start; }
      .error-links { align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor" aria-hidden="true"></div>

  <nav aria-label="Site navigation">
    <a class="nav-logo-link" href="/" aria-label="Subpress — return to home">
      <svg width="32" viewBox="0 0 38 31.683" overflow="visible" aria-hidden="true" focusable="false">
        <path d="M37.995 26.487c.02.625-.02 1.504-.099 2.157-.078.611-.213 1.196-.584 1.687C36.235 31.635 34.324 31.578 32.752 31.604c-3.188.045-6.43.07-9.559.079-.814-.006-.84-.085.072-.437.824-.323 1.97-.773 2.893-1.134 2.833-1.11 5.569-2.183 8.389-3.288.903-.334 2.091-.866 2.849-1.079.432-.098.571.15.597.719zM18.821.325C18.912.004 19.231-.001 19.513 0c.616 0 1.864.007 2.776.01 3.023.012 6.393.03 9.357.06.198.016 1.268-.037 1.034.143-2.603 1.02-5.557 1.94-8.115 2.866-1.545.53-3.466 1.219-5.032 1.743-.946.362-.781-.7-.811-1.548.035-.953-.09-2.017.099-2.949zM4.648.182C3.553.115 2.362.248 1.378.774-.094 1.556.077 3.632.009 5.126c-.02 2.787.001 7.099-.007 10.243-.006 2.22.003 7.65.003 9.649.004.307.021.585.312.733 1.741.76 4.898 1.897 6.928 2.71 1.861.735 4.144 1.592 6.494 2.512 1.192.484 1.742.647 2.816.654.849-.027 2.205.27 2.33-.921.085-7.119.001-17.005.029-24.164.003-.741.058-1.547-.73-1.83C16.872 4.197 14.512 3.448 13.097 2.94 10.903 2.175 8.221 1.272 5.945.483 5.523.341 5.099.227 4.667.184zM13.343 24.229c-.663 1.829-2.243 2.549-4.057 1.769-3.013-1.349-4.753-4.993-5.619-8.055-.778-2.988-.931-6.204.062-9.14.456-1.309 1.266-2.75 2.479-3.461 1.203-.699 2.676-.18 3.581.798.869.897 1.442 2.05 1.94 3.184 1.587 3.511 2.842 11.137 1.624 14.88z" fill="#ffeb3b"/>
        <path d="M7.724 9.588C6.618 9.828 5.996 11.035 5.682 12.05c-.803 2.878-.129 6.187 1.596 8.594.927 1.327 3.029 2.623 4.08.716.664-1.357.457-3.021.349-4.498-.202-2.044-1.246-7.561-3.961-7.278zm26.914 1.511c-.32-2.747-2.365-7.604-5.798-5.632-3.143 2.087-4.473 8.937-4.753 12.616-.098 1.214-.133 2.5-.058 3.68.055.839.146 1.651.443 2.441.977 2.685 3.525 2.546 5.536.881.784-.638 1.425-1.431 1.966-2.247 2.212-3.374 3.183-7.717 2.667-11.712zM30.209 20.525c-.806.985-2.404 1.805-3.288.508-.006-1.546.577-4.879.96-6.652.382-1.438 1.138-3.997 2.855-4.192 1.71.019 2.316 2.279 2.446 3.673.178 2.329-.47 4.839-1.956 6.643z" fill="#ffeb3b"/>
      </svg>
    </a>
    <a class="nav-back" href="/">
      <svg viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M12 7H2M6 3L2 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to home
    </a>
  </nav>

  <main>
    <p class="error-number" aria-label="Error 404">404</p>
    <div class="error-body">
      <p class="error-message">
        This page doesn't exist.<br>
        Maybe it <em>never did.</em>
      </p>
      <nav class="error-links" aria-label="Quick links">
        <a class="error-link" href="/">Home</a>
        <a class="error-link" href="/#inprint">In Print</a>
        <a class="error-link" href="/#services">Services</a>
        <a class="error-link" href="/#contact">Contact</a>
      </nav>
    </div>
  </main>

  <script>
    const cursor = document.getElementById('cursor');
    if (window.matchMedia('(pointer: fine)').matches) {
      cursor.classList.add('active');
      document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top  = e.clientY + 'px';
      });
      document.querySelectorAll('a').forEach(el => {
        el.addEventListener('mouseenter', () => cursor.classList.add('large'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('large'));
      });
    }
  </script>

</body>
</html>
