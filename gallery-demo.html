<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>In Print — Stacked Gallery Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --y: #ffeb3b; --k: #000; --w: #fff;
      --sora: 'Sora', sans-serif;
      --mono: 'Cascadia Code', 'Courier New', monospace;
    }
    @font-face {
      font-family: 'Cascadia Code'; font-style: normal; font-weight: 500; font-display: swap;
      src: url(https://fonts.gstatic.com/s/cascadiacode/v5/qWc_B6-zq5zxD57cT5s916v3QjfzRuG9AIUcXuU-OaDKb9pHaHCA.woff2) format('woff2');
    }

    body {
      background: var(--k);
      font-family: var(--sora);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Section wrapper ── */
    #inprint {
      background: var(--k);
      padding: 80px 80px 120px;
      overflow: hidden;
    }

    .inprint-masthead {
      display: flex;
      align-items: flex-end;
      gap: 32px;
      margin-bottom: 80px;
    }
    .inprint-masthead-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: rgba(255,255,255,.7);
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      padding-bottom: 4px;
      flex-shrink: 0;
    }
    .inprint-heading {
      font-family: var(--sora);
      font-size: clamp(80px,14vw,200px);
      font-weight: 800;
      line-height: .88;
      letter-spacing: -.04em;
      color: var(--w);
      flex: 1;
    }

    /* ── Pile container ── */
    .inprint-pile {
      position: relative;
      /* Height driven by the active card aspect ratio + controls */
      height: clamp(400px, 56vw, 780px);
      cursor: pointer;
      user-select: none;
    }

    /* ── Each card ── */
    .pile-card {
      position: absolute;
      inset: 0;
      border-radius: 4px;
      overflow: hidden;
      transform-origin: center bottom;
      transition:
        transform   0.65s cubic-bezier(.16,1,.3,1),
        opacity     0.65s cubic-bezier(.16,1,.3,1),
        box-shadow  0.65s cubic-bezier(.16,1,.3,1);
      will-change: transform;
    }

    .pile-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    /* Stack states — JS sets data-pos="0|1|2|3..." */

    /* Active card — front, centred, slight tilt from previous */
    .pile-card[data-pos="0"] {
      transform: rotate(0deg) translateY(0px);
      z-index: 10;
      box-shadow: 0 40px 120px rgba(0,0,0,.7), 0 8px 24px rgba(0,0,0,.5);
      opacity: 1;
    }

    /* Card 2 — slightly behind, peeking */
    .pile-card[data-pos="1"] {
      transform: rotate(3deg) translateY(12px) scale(0.97);
      z-index: 9;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      opacity: 1;
    }

    /* Card 3 */
    .pile-card[data-pos="2"] {
      transform: rotate(-2.5deg) translateY(22px) scale(0.94);
      z-index: 8;
      box-shadow: 0 12px 40px rgba(0,0,0,.4);
      opacity: 0.9;
    }

    /* Card 4 */
    .pile-card[data-pos="3"] {
      transform: rotate(4deg) translateY(30px) scale(0.91);
      z-index: 7;
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
      opacity: 0.75;
    }

    /* Card 5+ — hidden behind */
    .pile-card[data-pos="4"],
    .pile-card[data-pos="5"] {
      transform: rotate(-1deg) translateY(36px) scale(0.88);
      z-index: 6;
      opacity: 0.5;
    }

    /* Exiting — card being sent to back */
    .pile-card.exiting {
      transform: rotate(-8deg) translateX(-60px) translateY(-40px) scale(0.85);
      opacity: 1;
      z-index: 20;
      transition:
        transform 0.5s cubic-bezier(.4,0,.2,1),
        opacity   0.4s ease;
    }

    /* ── Controls ── */
    .pile-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,.1);
    }

    .pile-counter {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: rgba(255,255,255,.4);
    }
    .pile-counter span {
      color: var(--y);
    }

    .pile-hint {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: rgba(255,255,255,.3);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pile-btn {
      background: none;
      border: 1px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.6);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: 10px 20px;
      border-radius: 2px;
      cursor: pointer;
      transition: border-color .2s, color .2s, background .2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pile-btn:hover {
      border-color: var(--y);
      color: var(--y);
      background: rgba(255,235,59,.05);
    }
    .pile-btn svg { width: 12px; height: 12px; }

    /* ── Caption ── */
    .pile-caption {
      margin-top: 20px;
      min-height: 24px;
    }
    .pile-caption-text {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: rgba(255,255,255,.5);
      transition: opacity .3s;
    }
    .pile-caption-text.fading { opacity: 0; }

    @media (max-width: 600px) {
      #inprint { padding: 48px 24px 80px; }
      .inprint-pile { height: clamp(260px, 72vw, 480px); }
      .pile-hint { display: none; }
    }
  </style>
</head>
<body>

<section id="inprint" aria-labelledby="inprint-heading">
  <div class="inprint-masthead">
    <span class="inprint-masthead-label" aria-hidden="true">In Print</span>
    <h2 class="inprint-heading" id="inprint-heading">In<br>Print</h2>
  </div>

  <!-- Pile gallery — click or next to cycle through -->
  <div class="inprint-pile" id="pile" role="region" aria-label="Publication gallery" tabindex="0">

    <!-- Cards — replace src with your mockup images -->
    <div class="pile-card" data-pos="0" data-label="FF3 — Hydro Tasmania, 2024">
      <img src="/img/SP-Sample-FF3Tas.png" alt="FF3 Hydro Tasmania spread">
    </div>
    <div class="pile-card" data-pos="1" data-label="Issue 02 — Field Notes, 2024">
      <img src="/img/SP-Sample-FF3Tas.png" alt="Issue 02 Field Notes">
    </div>
    <div class="pile-card" data-pos="2" data-label="Zine — Unnamed Series, 2023">
      <img src="/img/SP-Sample-FF3Tas.png" alt="Unnamed zine">
    </div>
    <div class="pile-card" data-pos="3" data-label="Broadsheet — Open Call, 2023">
      <img src="/img/SP-Sample-FF3Tas.png" alt="Open call broadsheet">
    </div>

  </div>

  <div class="pile-controls">
    <span class="pile-counter"><span id="pile-current">1</span> / <span id="pile-total">4</span></span>
    <span class="pile-hint">Click image to cycle</span>
    <button class="pile-btn" id="pile-next" aria-label="Next publication">
      Next
      <svg viewBox="0 0 12 12" fill="none">
        <path d="M2 6h8M6 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</section>

<script>
  const pile  = document.getElementById('pile');
  const cards = Array.from(pile.querySelectorAll('.pile-card'));
  const counter = document.getElementById('pile-current');
  const caption = document.getElementById('pile-caption');
  const total   = document.getElementById('pile-total');
  total.textContent = cards.length;

  let current = 0;
  let animating = false;

  // Alternating tilt directions so it feels organic
  const tilts = [2.5, -3, 4, -2, 3.5, -1.5];

  function updatePositions() {
    cards.forEach((card, i) => {
      const pos = ((i - current) % cards.length + cards.length) % cards.length;
      card.setAttribute('data-pos', Math.min(pos, 5));
    });
    counter.textContent = current + 1;

    // Update caption
    const activeCard = cards[current];
    const label = activeCard.dataset.label || '';
    caption.classList.add('fading');
    setTimeout(() => {
      caption.textContent = label;
      caption.classList.remove('fading');
    }, 150);
  }

  function advance() {
    if (animating) return;
    animating = true;

    const frontCard = cards[current];

    // Animate front card flying off
    frontCard.classList.add('exiting');

    setTimeout(() => {
      frontCard.classList.remove('exiting');
      current = (current + 1) % cards.length;
      updatePositions();
      animating = false;
    }, 480);
  }

  // Click pile or press Next button
  pile.addEventListener('click', advance);
  document.getElementById('pile-next').addEventListener('click', e => {
    e.stopPropagation();
    advance();
  });

  // Keyboard
  pile.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); advance(); }
  });

  updatePositions();
</script>

</body>
</html>
